name: Auto-Update Jackpots

on:
  schedule:
    - cron: '0 10 * * 0,4'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch API and Update JSON
        uses: actions/github-script@v7
        env:
          COLLECT_API_KEY: ${{ secrets.COLLECT_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            
            let rawKey = process.env.COLLECT_API_KEY.trim();
            if (rawKey.toLowerCase().startsWith('apikey ')) {
                rawKey = rawKey.substring(7).trim();
            }
            
            const options = {
              method: 'GET',
              headers: {
                'authorization': `apikey ${rawKey}`,
                'content-type': 'application/json'
              }
            };
            
            try {
              console.log("Fetching Powerball...");
              const pbRes = await fetch('https://api.collectapi.com/chancegame/usaPowerball', options);
              const pbData = await pbRes.json();
              
              console.log("Fetching Mega Millions...");
              const mmRes = await fetch('https://api.collectapi.com/chancegame/usaMegaMillions', options);
              const mmData = await mmRes.json();
              
              // 🟢 FIX 1: Ignore their broken "success" flag. Just check if the data exists.
              if (!pbData.result) throw new Error("Powerball data missing: " + JSON.stringify(pbData));
              if (!mmData.result) throw new Error("Mega Millions data missing: " + JSON.stringify(mmData));
              
              // 🟢 FIX 2: Check for both "nextJackpot" and "next-jackpot" spellings.
              const pbRaw = pbData.result?.['next-jackpot']?.amount || pbData.result?.nextJackpot?.amount || pbData.result?.jackpot;
              const mmRaw = mmData.result?.['next-jackpot']?.amount || mmData.result?.nextJackpot?.amount || mmData.result?.jackpot;
              
              if (!pbRaw || !mmRaw) {
                  throw new Error("Amounts missing! PB: " + JSON.stringify(pbData) + " MM: " + JSON.stringify(mmData));
              }
              
              function cleanAmount(str) {
                let num = parseFloat(str.replace(/[^0-9.]/g, ''));
                if (str.toLowerCase().includes('billion')) num *= 1000000000;
                else if (str.toLowerCase().includes('million')) num *= 1000000;
                return num;
              }
              
              const newData = {
                powerball: cleanAmount(pbRaw),
                megaMillions: cleanAmount(mmRaw),
                lastUpdated: new Date().toISOString()
              };
              
              fs.writeFileSync('jackpots.json', JSON.stringify(newData, null, 2));
              console.log("Successfully updated jackpots.json:", newData);
              
            } catch (error) {
              console.error("API Fetch Failed:", error);
              process.exit(1);
            }

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Jackpot Bot"
          git config --global user.email "bot@example.com"
          git add jackpots.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-updated jackpots" && git push)
